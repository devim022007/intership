<!DOCTYPE html>
<html>
<head>
<title>Contact Form</title>
</head>
<style>
body{
  background:#f2f2f2;
  font-family:Georgia;
  padding:30px;
}
.form-box{
  background:white;
  width:1200px;
  padding:40px;
  border-radius:30px;
  margin:auto;
}
h1{
  text-align:center;
  font-size:50px;
}
input{
  width:520px;
  padding:25px;
  margin:20px;
  border-radius:20px;
  border:1px solid lightgray;
  font-size:25px;
}
.name{
  width:1120px;
}
textarea{
  width:1120px;
  height:200px;
  padding:25px;
  margin:20px;
  border-radius:20px;
  border:1px solid lightgray;
  font-size:25px;
}
button{
  background:rgb(218, 32, 110);
  color:white;
  padding:20px 40px;
  border: none;
  border-radius:40px;
  font-size:30px;
  display:block;
  margin:auto;
}
</style>
<body>
<div class="form-box">
<h1>Send me a message</h1>
<input type="text" placeholder="Enter Your Name / Company*" class="name">
<input type="email" placeholder="Enter Your Email*">
<input type="text" placeholder="Enter Phone Number*">
<textarea placeholder="Write Message..."></textarea>
<button>Send Message</button>
</div>
</body>
</html>
