<!DOCTYPE html>
<html>
<head>
    <title>Amazon Gift Cards</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .gift-card{
            border-radius:25px;
            overflow:hidden;
            background:white;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        .gift-card img{
            width:100%;
            height:300px;
            object-fit:cover;
        }

        .gift-card h2{
            text-align:center;
            padding:20px;
            font-size:45px;
        }
    </style>
</head>

<body>

<div class="container-fluid mt-3">

    <h1 class="text-center fw-bold mb-4 pt-4 pb-4">
        Explore popular Amazon Pay Gift Cards
    </h1>

    <div class="row g-5">

        <div class="col-md-4">
            <div class="gift-card">
                <img src="Images/your.jpg" alt="Your Photo">
                <h2>Your Photo</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="gift-card">
                <img src="Images/cake.jpeg" alt="Animated">
                <h2>Animated</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="gift-card">
                <img src="Images/gift.jpg" alt="Physical">
                <h2>Physical</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
