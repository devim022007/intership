<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cards</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    .card-box{
      position: relative;
      border-radius: 20px;
      overflow: hidden;
    }

    .card-box img{
      width: 100%;
      height: 500px;
      object-fit: cover;
    }

    .card-text{
      position: absolute;
      bottom: 30px;
      left: 20px;
      color: white;
    }

  </style>

</head>

<body>

  <div class="container mt-5">

    <div class="row">

      <div class="col">

        <div class="card-box">

          <img src="https://images.unsplash.com/photo-1532693322450-2cb5c511067d">

          <div class="card-text">

            <h1 class="fw-bold">
              Short title,
              long jacket
            </h1>

            <p>Earth • 3d</p>

          </div>

        </div>

      </div>
      <div class="col">

        <div class="card-box">

          <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">

          <div class="card-text">

            <h1 class="fw-bold">
              Much longer title that wraps to multiple lines
            </h1>

            <p>Pakistan • 4d</p>

          </div>

        </div>

      </div>
      <div class="col">

        <div class="card-box">

          <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5">

          <div class="card-text">

            <h1 class="fw-bold">
              Another longer title belongs here
            </h1>

            <p>California • 5d</p>

          </div>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
