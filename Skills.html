<!DOCTYPE html>
<html lang="en">
<head>
  <title>Skills</title>
</head>
<style>
body{
  background: black;
  font-family: Georgia;
  padding:30px;
}
h1{
  color: gold;
  text-align: center;
  font-size: 60px;
}  
.container{
  width:1200px;
  margin: auto;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}
.card{
  background: white;
  width: 500px;
  padding: 20px;
  border-radius: 20px;
}
h2{
  font-size: 28px;
}
span{
  background: #f3ead7;
  color:goldenrod;
  padding: 8px 15px;
  border-radius: 20px;
  display: inline-block;
  margin: 10px;
  font-size: 14px;
}
</style>
<body>
  <h1>Technical Skills</h1>
  <div class="container">
    <div class="card">
      <h2>Frontend</h2>
      <span>Html</span>
      <span>Css</span>
      <span>JavaScript</span>
    </div>
    <div class="card">
      <h2>Backend</h2>
      <span>PHP</span>
      <span>MySQL</span>
      <span>WordPress</span>
    </div>
    <div class="card">
      <h2>Design</h2>
      <span>Figma</span>
      <span>Canva</span>
    </div>
    <div class="card">
      <h2>Tools</h2>
      <span>GitHub</span>
      <span>Python</span>
    </div>
 </div>
</body>
</html>
