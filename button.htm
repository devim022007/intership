<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Styling Example</title>
  <style>
    body {
      background: rgb(191, 112, 188); /* default background */
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    .btn {
      background-color: rgb(18, 8, 92);
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px; /* rounded corners */
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2); /* shadow effect */
      transition: background-color 0.3s, transform 0.2s;
    }
    .btn:hover {
      background-color: rgb(55, 55, 219); /* hover color */
      transform: scale(1.05); /* slight zoom on hover */
    }
    .btn:active {
      transform: scale(0.95); /* pressed effect */
    }
  </style>
</head>
<body>
    <h1>Button Styling</h1>
  <button class="btn">Click Me</button>
</body>
</html>
