<!DOCTYPE html>
<html>
<head>
    <title>Card</title>
    </head>
    <style>

        .card{
            width: 200px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        img{
            width: 100%;
            align-items: center;
        }

        button{
            background: blue;
            color: white;
        }

    </style>
    <body>
        <div class="card">
         <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600" alt="Travel">
         <h2>Travel</h2>
        <p>
            Discover beautiful places and enjoy your next adventure with us.
        </p>
        <button>Explore</button>
     </div>
    </body>
    </html>
