<!DOCTYPE html>
<html lang="en">
<head>
    <title>Water Bottle Cards</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card img{
            height:300px;
            object-fit:contain;
            padding:10px;
        }

        .price{
            font-size:22px;
            font-weight:bold;
        }

        .old-price{
            text-decoration:line-through;
            color:gray;
        }

        .offer{
            color:green;
            font-weight:bold;
        }

        .stock{
            color:#d1006b;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row">

        <!-- Card 1 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=500" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">
                        SKYLIFE Smart Buy Premium Quality Water Bottle
                    </h5>

                    <p>
                        ⭐ 4.0 (2,020)
                    </p>

                    <span class="price">₹118</span>
                    <span class="old-price">₹599</span>
                    <span class="offer">80% off</span>

                    <p class="stock mt-2">Only few left</p>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1523362628745-0c100150b504?w=500" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">
                        ELINOR Stainless Steel Water Bottle
                    </h5>

                    <p>
                        ⭐ 4.1 (16,395)
                    </p>

                    <span class="price">₹178</span>
                    <span class="old-price">₹499</span>
                    <span class="offer">64% off</span>

                    <p class="stock mt-2">Only few left</p>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=500" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">
                        DFit 2 Liter Transparent Motivational Bottle
                    </h5>

                    <p>
                        ⭐ 4.1 (23,274)
                    </p>

                    <span class="price">₹164</span>
                    <span class="old-price">₹1288</span>
                    <span class="offer">87% off</span>

                    <p class="stock mt-2">Only few left</p>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
